<!DOCTYPE html>
<html>
<head><title>WebGPU Multi-Pass Test</title></head>
<body>
<canvas id="canvas" width="512" height="512"></canvas>
<script>
async function main() {
    if (!navigator.gpu) { document.title = 'NO_WEBGPU'; return; }

    const adapter = await navigator.gpu.requestAdapter();
    if (!adapter) { document.title = 'NO_ADAPTER'; return; }

    const device = await adapter.requestDevice();
    const canvas = document.getElementById('canvas');
    const context = canvas.getContext('webgpu');
    const format = navigator.gpu.getPreferredCanvasFormat();

    context.configure({ device, format, alphaMode: 'premultiplied' });

    // Shader 1: Red triangle
    const shader1 = device.createShaderModule({
        label: 'red shader',
        code: `
            @vertex fn vs(@builtin(vertex_index) i: u32) -> @builtin(position) vec4f {
                let p = array<vec2f, 3>(vec2f(0.0, 0.5), vec2f(-0.5, -0.5), vec2f(0.5, -0.5));
                return vec4f(p[i], 0.0, 1.0);
            }
            @fragment fn fs() -> @location(0) vec4f {
                return vec4f(1.0, 0.2, 0.2, 1.0);
            }
        `
    });

    // Shader 2: Green quad (using uniform for offset)
    const shader2 = device.createShaderModule({
        label: 'green shader',
        code: `
            @group(0) @binding(0) var<uniform> offset: vec2f;

            @vertex fn vs(@builtin(vertex_index) i: u32) -> @builtin(position) vec4f {
                let p = array<vec2f, 6>(
                    vec2f(-0.3, -0.3), vec2f(0.3, -0.3), vec2f(-0.3, 0.3),
                    vec2f(-0.3, 0.3), vec2f(0.3, -0.3), vec2f(0.3, 0.3)
                );
                return vec4f(p[i] + offset, 0.0, 1.0);
            }
            @fragment fn fs() -> @location(0) vec4f {
                return vec4f(0.2, 1.0, 0.2, 0.5);
            }
        `
    });

    const pipeline1 = device.createRenderPipeline({
        label: 'red pipeline',
        layout: 'auto',
        vertex: { module: shader1, entryPoint: 'vs' },
        fragment: { module: shader1, entryPoint: 'fs', targets: [{ format }] },
    });

    const pipeline2 = device.createRenderPipeline({
        label: 'green pipeline',
        layout: 'auto',
        vertex: { module: shader2, entryPoint: 'vs' },
        fragment: {
            module: shader2, entryPoint: 'fs',
            targets: [{
                format,
                blend: {
                    color: { srcFactor: 'src-alpha', dstFactor: 'one-minus-src-alpha' },
                    alpha: { srcFactor: 'one', dstFactor: 'one-minus-src-alpha' },
                }
            }]
        },
    });

    // Uniform buffer for offset
    const uniformBuffer = device.createBuffer({
        label: 'offset uniform',
        size: 8,
        usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
    });
    device.queue.writeBuffer(uniformBuffer, 0, new Float32Array([0.2, 0.1]));

    const bindGroup = device.createBindGroup({
        layout: pipeline2.getBindGroupLayout(0),
        entries: [{ binding: 0, resource: { buffer: uniformBuffer } }],
    });

    function frame() {
        const encoder = device.createCommandEncoder();
        const textureView = context.getCurrentTexture().createView();

        // Pass 1: Clear and draw red triangle
        const pass1 = encoder.beginRenderPass({
            colorAttachments: [{
                view: textureView,
                clearValue: { r: 0.05, g: 0.05, b: 0.1, a: 1.0 },
                loadOp: 'clear',
                storeOp: 'store',
            }],
        });
        pass1.setPipeline(pipeline1);
        pass1.draw(3);
        pass1.end();

        // Pass 2: Draw green quad on top (with blending)
        const pass2 = encoder.beginRenderPass({
            colorAttachments: [{
                view: textureView,
                loadOp: 'load',
                storeOp: 'store',
            }],
        });
        pass2.setPipeline(pipeline2);
        pass2.setBindGroup(0, bindGroup);
        pass2.draw(6);
        pass2.end();

        device.queue.submit([encoder.finish()]);

        window.__webgpuFrameCount = (window.__webgpuFrameCount || 0) + 1;
        document.title = 'READY_' + window.__webgpuFrameCount;
        requestAnimationFrame(frame);
    }

    requestAnimationFrame(frame);
}
main().catch(err => { document.title = 'ERROR_' + err.message; });
</script>
</body>
</html>
