<!DOCTYPE html>
<html>
<head><title>WebGPU Compute Test</title></head>
<body>
<pre id="output"></pre>
<script>
async function main() {
    if (!navigator.gpu) {
        document.title = 'NO_WEBGPU';
        return;
    }

    const adapter = await navigator.gpu.requestAdapter();
    if (!adapter) {
        document.title = 'NO_ADAPTER';
        return;
    }

    const device = await adapter.requestDevice();

    const shaderModule = device.createShaderModule({
        label: 'compute shader',
        code: `
            @group(0) @binding(0) var<storage, read_write> data: array<f32>;

            @compute @workgroup_size(64)
            fn main(@builtin(global_invocation_id) id: vec3u) {
                let i = id.x;
                if (i < arrayLength(&data)) {
                    data[i] = data[i] * 2.0;
                }
            }
        `
    });

    const pipeline = device.createComputePipeline({
        label: 'doubler pipeline',
        layout: 'auto',
        compute: {
            module: shaderModule,
            entryPoint: 'main',
        },
    });

    // Create input data
    const inputData = new Float32Array(256);
    for (let i = 0; i < 256; i++) inputData[i] = i;

    const buffer = device.createBuffer({
        label: 'data buffer',
        size: inputData.byteLength,
        usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC | GPUBufferUsage.COPY_DST,
    });
    device.queue.writeBuffer(buffer, 0, inputData);

    const bindGroup = device.createBindGroup({
        label: 'compute bind group',
        layout: pipeline.getBindGroupLayout(0),
        entries: [{ binding: 0, resource: { buffer } }],
    });

    // Dispatch compute
    const encoder = device.createCommandEncoder();
    const pass = encoder.beginComputePass();
    pass.setPipeline(pipeline);
    pass.setBindGroup(0, bindGroup);
    pass.dispatchWorkgroups(4);  // 4 * 64 = 256 threads
    pass.end();
    device.queue.submit([encoder.finish()]);

    // Read back
    const readBuffer = device.createBuffer({
        size: inputData.byteLength,
        usage: GPUBufferUsage.MAP_READ | GPUBufferUsage.COPY_DST,
    });
    const encoder2 = device.createCommandEncoder();
    encoder2.copyBufferToBuffer(buffer, 0, readBuffer, 0, inputData.byteLength);
    device.queue.submit([encoder2.finish()]);

    await readBuffer.mapAsync(GPUMapMode.READ);
    const result = new Float32Array(readBuffer.getMappedRange());
    document.getElementById('output').textContent =
        `Result[0]=${result[0]}, Result[1]=${result[1]}, Result[255]=${result[255]}`;
    readBuffer.unmap();

    window.__computeDone = true;
    document.title = 'COMPUTE_DONE';
}

main().catch(err => {
    document.title = 'ERROR_' + err.message;
    console.error(err);
});
</script>
</body>
</html>
