<!DOCTYPE html>
<html>
<head><title>No WebGPU Page</title></head>
<body>
<h1>Hello World</h1>
<canvas id="c" width="256" height="256"></canvas>
<script>
// Use 2D canvas only — no WebGPU
const ctx = document.getElementById('c').getContext('2d');
ctx.fillStyle = 'red';
ctx.fillRect(10, 10, 100, 100);
ctx.fillStyle = 'blue';
ctx.fillRect(50, 50, 100, 100);
document.title = 'NO_GPU_PAGE';
</script>
</body>
</html>
